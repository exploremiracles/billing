<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.1/css/all.min.css">

    <style>
        :root {
            --primary: #000000;
            --secondary: #000000;
            --accent: #000000;
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --medium-gray: #e0e0e0;
            --dark-gray: #333333;
            --pure-black: #000000;
            --success: #27ae60;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
              background: linear-gradient(135deg, #FFFFFF 0%, #FFFFFF 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
            position: relative;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: 
                radial-gradient(circle at 20% 50%, rgba(212, 175, 55, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 80% 20%, rgba(15, 52, 96, 0.1) 0%, transparent 50%),
                radial-gradient(circle at 50% 80%, rgba(212, 175, 55, 0.05) 0%, transparent 50%);
            animation: backgroundShift 20s ease-in-out infinite;
            pointer-events: none;
            z-index: 0;
        }

        @keyframes backgroundShift {
            0%, 100% { opacity: 0.5; }
            50% { opacity: 1; }
        }

        .app-container {
            width: 100%;
            max-width: 550px;
            background: var(--white);
            border-radius: 24px;
            box-shadow: 0 25px 80px rgba(0, 0, 0, 0.35);
            overflow: hidden;
            position: relative;
            z-index: 1;
            animation: containerAppear 0.6s ease-out;
        }

        @keyframes containerAppear {
            from {
                opacity: 0;
                transform: translateY(30px);
            }
            to {
                opacity: 1;
                transform: translateY(0);
            }
        }

        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            padding: 35px 25px 30px;
            text-align: center;
            position: relative;
            overflow: hidden;
        }

        .app-header::before {
            content: '';
            position: absolute;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle, rgba(212, 175, 55, 0.1) 0%, transparent 60%);
            animation: headerGlow 4s ease-in-out infinite;
        }

        @keyframes headerGlow {
            0%, 100% { transform: scale(1); opacity: 0.5; }
            50% { transform: scale(1.2); opacity: 1; }
        }

        .logo-container {
            margin-bottom: 20px;
            position: relative;
            z-index: 1;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .logo-image {
            width: 300px;
            height: auto;
            object-fit: contain;
            animation: logoFloat 3s ease-in-out infinite;
        }

        @keyframes logoFloat {
            0%, 100% { transform: translateY(0); }
            50% { transform: translateY(-5px); }
        }

        .brand-tagline {
            font-size: 0.95rem;
            color: #ffffff;
            letter-spacing: 1px;
            font-style: italic;
            opacity: 0.9;
            position: relative;
            z-index: 1;
            font-weight: 500;
        }

        .app-body {
            padding: 35px 30px;
            background: var(--white);
        }

        .form-group {
            margin-bottom: 24px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 700;
            color: var(--dark-gray);
            margin-bottom: 10px;
            text-transform: uppercase;
            letter-spacing: 0.8px;
        }

        .form-input {
            width: 100%;
            padding: 16px 20px;
            border: 2px solid var(--medium-gray);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
            background: var(--light-gray);
            font-family: inherit;
            color: var(--dark-gray);
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 4px rgba(15, 52, 96, 0.08);
            background: var(--white);
            transform: translateY(-1px);
        }

        .form-input::placeholder {
            color: #999;
        }

        .payment-modes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 15px;
        }

        .payment-option {
            padding: 16px;
            border: 2px solid var(--medium-gray);
            border-radius: var(--border-radius);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--light-gray);
            font-weight: 600;
            color: var(--dark-gray);
            font-size: 1rem;
            position: relative;
            overflow: hidden;
        }

        .payment-option:hover {
            border-color: var(--accent);
            background: #f0f4ff;
            transform: translateY(-2px);
            box-shadow: 0 5px 15px rgba(0,0,0,0.08);
        }

        .payment-option:active {
            transform: scale(0.98);
        }

        .payment-option.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            color: var(--white);
            box-shadow: 0 8px 25px rgba(15, 52, 96, 0.3);
            animation: optionSelect 0.3s ease;
        }

        @keyframes optionSelect {
            0% { transform: scale(0.95); }
            50% { transform: scale(1.05); }
            100% { transform: scale(1); }
        }

        .submit-btn {
            width: 100%;
            padding: 18px;
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            color: var(--primary);
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.15rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);

            margin-top: 15px;

            overflow: hidden;
            box-shadow: 0 8px 25px rgba(212, 175, 55, 0.3);
        }

        .submit-btn:hover {
            transform: translateY(-3px);
            box-shadow: 0 15px 35px rgba(212, 175, 55, 0.5);
        }

        .submit-btn:active {
            transform: translateY(-1px);
        }

        .submit-btn:disabled {
            opacity: 0.7;
            cursor: not-allowed;
            transform: none;
            box-shadow: 0 5px 15px rgba(212, 175, 55, 0.2);
        }

        .submit-btn .btn-content {

        }

        .loading-spinner {

            height: 22px;

            border-radius: 50%;

        }

        /* Receipt Modal */
        .modal-overlay {

            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.85);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            backdrop-filter: blur(5px);
            animation: fadeIn 0.2s ease;

        @keyframes fadeIn {
            from { opacity: 0; }
            to { opacity: 1; }

        .modal-overlay.active {
            display: flex;
        }

            border-radius: 24px;
            max-width: 480px;
            width: 95%;
            max-height: 90vh;

        @keyframes slideIn {
            from {

        .notification.success {

<body>
    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <div class="logo-container">
                <img src="logo.jpg" alt="ELITE AUTO WASH EXPRESS" class="logo-image">
            </div>
            <p class="brand-tagline">Divine Shrine for Your Blessed Ride </p>
        </div>

        <!-- Form -->
        <div class="app-body">
            <form id="billingForm" autocomplete="off">
                <div class="form-group">
                    <label class="form-label" for="vehicleNo">🚗 Vehicle Number</label>
                    <input type="text" id="vehicleNo" class="form-input" 
                           placeholder="Enter vehicle number (e.g., KA 01 AB 1234)" 
                           required autocomplete="off" maxlength="20">
                </div>

                <div class="form-group">
                    <label class="form-label" for="amount">💰 Amount Paid (₹)</label>
                    <input type="number" id="amount" class="form-input" 
                           placeholder="Enter amount in rupees" min="1" max="999999" required>
                </div>

                <div class="form-group">
                    <label class="form-label">💳 Payment Mode</label>
                    <div class="payment-modes">
                        <div class="payment-option selected" data-mode="cash" onclick="selectPaymentMode('cash', this)">
                            💵 Cash
                        </div>
                        <div class="payment-option" data-mode="upi" onclick="selectPaymentMode('upi', this)">
                            📱 UPI
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span class="btn-content">
                        <span id="btnText">Generate Receipt</span>
                    </span>
                </button>
            </form>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <div class="receipt" id="receiptContent">
                <!-- Receipt generated dynamically -->
            </div>
            <div class="modal-actions">
                <button class="action-btn whatsapp-btn" onclick="sendViaWhatsApp()">
                    📤 Send via WhatsApp
                </button>
                <button class="action-btn close-btn" onclick="closeReceipt()">
                    ✕ Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // ============================================
        

const firebaseConfig = {
  apiKey: "AIzaSyAxQoFW6QiaazIcvkEPsYbnTv7zfKe8c-Y",
  authDomain: "patternetweb.firebaseapp.com",
  databaseURL: "https://patternetweb-default-rtdb.firebaseio.com",
  projectId: "patternetweb",
  storageBucket: "patternetweb.firebasestorage.app",
  messagingSenderId: "78400752693",
  appId: "1:78400752693:web:540fbbcab615e6b078b57c"
};


        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let selectedPaymentMode = 'cash';
        let currentReceiptData = null;

        // ============================================
        // PAYMENT MODE SELECTION
        // ============================================
        function selectPaymentMode(mode, element) {
            selectedPaymentMode = mode;
            
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        // ============================================
        // GENERATE SEQUENTIAL TOKEN FROM FIRESTORE
        // ============================================
        async function generateToken() {
            try {
                const snapshot = await db.collection('bills')
                    .orderBy('tokenNumber', 'desc')
                    .limit(1)
                    .get();
                
                let nextNumber = 1;
                
                if (!snapshot.empty) {
                    const lastBill = snapshot.docs[0].data();
                    if (lastBill.tokenNumber) {
                        nextNumber = lastBill.tokenNumber + 1;
                    }
                }
                
                const paddedNumber = String(nextNumber).padStart(4, '0');
                const token = `#${paddedNumber}`;
                
                return {
                    token: token,
                    tokenNumber: nextNumber
                };
            } catch (error) {
                console.error('Error generating token:', error);
                const fallbackNumber = Date.now();
                const paddedFallback = String(fallbackNumber).slice(-4);
                return {
                    token: `1-${paddedFallback}`,
                    tokenNumber: fallbackNumber
                };
            }
        }

        // ============================================
        // FORMAT DATE AND TIME
        // ============================================
        function formatDateTime() {
            const now = new Date();
            
            const dateOptions = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            
            const timeOptions = { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            
            return {
                date: now.toLocaleDateString('en-IN', dateOptions),
                time: now.toLocaleTimeString('en-IN', timeOptions),
                isoDate: now.toISOString().split('T')[0],
                isoTime: now.toTimeString().split(' ')[0]
            };
        }

        // ============================================
        // SAVE TO FIRESTORE
        // ============================================
        async function saveToFirestore(receiptData) {
            try {
                const docRef = await db.collection('bills').add({
                    token: receiptData.token,
                    tokenNumber: receiptData.tokenNumber,
                    vehicleNo: receiptData.vehicleNo,
                    amount: receiptData.amount,
                    paymentMode: receiptData.paymentMode,
                    date: receiptData.date,
                    time: receiptData.time,
                    isoDate: receiptData.isoDate,
                    isoTime: receiptData.isoTime,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                console.log('✅ Receipt saved with ID:', docRef.id);
                console.log('🎫 Token:', receiptData.token, '| Number:', receiptData.tokenNumber);
                return docRef.id;
            } catch (error) {
                console.error('❌ Error saving to Firestore:', error);
                throw error;
            }
        }

        // ============================================
        // GENERATE RECEIPT HTML
        // ============================================
        function generateReceiptHTML(data) {
            return `
                <div class="receipt-header">
                    <img src="logo.jpg" alt="ELITE AUTO WASH EXPRESS" class="receipt-logo-img">
                    <div class="receipt-tagline">Divine Shrine for Your Blessed Ride</div>
                    <div class="receipt-token">${data.token}</div>
                    <div style="font-size: 0.65rem; color: #666; margin-top: 5px; font-weight: 500;">
                        Token No. #${data.tokenNumber}
                    </div>
                </div>
                
                <div class="receipt-details">
                    <div class="receipt-row">
                        <span class="receipt-label"><i class="fa-regular fa-calendar"></i> Date</span>
                        <span class="receipt-value">${data.date}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="receipt-label"><i class="fa-regular fa-clock"></i> Time</span>
                        <span class="receipt-value">${data.time}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="receipt-label"><i class="fa-solid fa-car"></i> Vehicle No.</span>
                        <span class="receipt-value">${data.vehicleNo}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="receipt-label"><i class="fa-brands fa-amazon-pay"></i> Payment Mode</span>
                        <span class="receipt-value">${data.paymentMode === 'cash' ? '💵 Cash' : '📱 UPI'}</span>
                    </div>
                </div>
                
                <div class="receipt-amount">
                    <div style="font-size: 0.8rem; color: #666; margin-bottom: 8px; font-weight: 600; text-transform: uppercase; letter-spacing: 1px;">
                        Amount Paid
                    </div>
                    <div class="receipt-amount-value">₹ ${data.amount.toLocaleString('en-IN')}</div>
                </div>
                
                <div class="receipt-footer">
                    <div class="receipt-thankyou">Thank You! Visit Again....</div>
                    <div style="margin-top: 12px; font-weight: 600;">Drive Safe & Stay Blessed</div>
                    <div style="font-size: 0.7rem; margin-top: 15px; opacity: 0.5;">
                        This is a computer-generated receipt<br>
                        Token: ${data.token}
                    </div>
                </div>
            `;
        }

        // ============================================
        // SHOW RECEIPT MODAL
        // ============================================
        function showReceipt(data) {
            currentReceiptData = data;
            const receiptHTML = generateReceiptHTML(data);
            document.getElementById('receiptContent').innerHTML = receiptHTML;
            document.getElementById('receiptModal').classList.add('active');
            document.body.style.overflow = 'hidden';
        }

        // ============================================
        // CLOSE RECEIPT MODAL
        // ============================================
        function closeReceipt() {
            document.getElementById('receiptModal').classList.remove('active');
            currentReceiptData = null;
            document.body.style.overflow = '';
            document.getElementById('vehicleNo').focus();
        }

        // ============================================
        // SEND VIA WHATSAPP
        // ============================================
        function sendViaWhatsApp() {
            if (!currentReceiptData) {
                showNotification('No receipt data found', 'error');
                return;
            }

            const receiptElement = document.getElementById('receiptContent');
            const whatsappBtn = document.querySelector('.whatsapp-btn');
            const originalText = whatsappBtn.innerHTML;
            whatsappBtn.innerHTML = '⏳ Generating image...';
            whatsappBtn.disabled = true;
            
            html2canvas(receiptElement, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false,
                allowTaint: false,
                useCORS: true
            }).then(canvas => {
                canvas.toBlob(function(blob) {
                    const file = new File([blob], `receipt-${currentReceiptData.token}.png`, { 
                        type: 'image/png' 
                    });
                    
                    if (file.size > 5 * 1024 * 1024) {
                        showNotification('Image too large. Downloading instead...', 'error');
                        downloadReceiptImage(canvas);
                        resetWhatsAppButton(whatsappBtn, originalText);
                        return;
                    }
                    
                    const shareText = 
                        `*ELITE AUTO WASH EXPRESS* ✨\n` +
                        `*Divine Shrine for Your Blessed Ride*\n\n` +
                        `🎫 *Token:* ${currentReceiptData.token}\n` +
                        `🚗 *Vehicle:* ${currentReceiptData.vehicleNo}\n` +
                        `💰 *Amount:* ₹${currentReceiptData.amount.toLocaleString('en-IN')}\n` +
                        `💳 *Payment:* ${currentReceiptData.paymentMode === 'cash' ? 'Cash' : 'UPI'}\n` +
                        `📅 *Date:* ${currentReceiptData.date}\n\n` +
                        `🙏 *Thank You! Visit Again* 🙏`;
                    
                    if (navigator.canShare && navigator.canShare({ files: [file] })) {
                        navigator.share({
                            files: [file],
                            title: 'ELITE AUTO WASH EXPRESS - Receipt',
                            text: shareText
                        })
                            .then(() => showNotification('Receipt shared successfully! ✅', 'success'))
                            .catch(err => {
                                console.log('Share cancelled:', err);
                                downloadReceiptImage(canvas);
                            })
                            .finally(() => resetWhatsAppButton(whatsappBtn, originalText));
                    } else {
                        downloadReceiptImage(canvas);
                        resetWhatsAppButton(whatsappBtn, originalText);
                    }
                }, 'image/png');
            }).catch(error => {
                console.error('Error generating image:', error);
                showNotification('Error generating receipt image', 'error');
                resetWhatsAppButton(whatsappBtn, originalText);
            });
        }

        function resetWhatsAppButton(button, originalText) {
            button.innerHTML = originalText;
            button.disabled = false;
        }

        function downloadReceiptImage(canvas) {
            const link = document.createElement('a');
            link.download = `receipt-${currentReceiptData.token}.png`;
            link.href = canvas.toDataURL('image/png', 1.0);
            link.click();
            showNotification('Receipt downloaded! Share manually 📥', 'success');
        }

        function showNotification(message, type = 'success') {
            const existing = document.querySelectorAll('.notification');
            existing.forEach(n => {
                n.style.opacity = '0';
                n.style.transition = 'opacity 0.3s ease';
                setTimeout(() => n.remove(), 300);
            });
            
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3500);
        }

        // ============================================
        // FORM SUBMISSION
        // ============================================
        document.getElementById('billingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            const vehicleNo = document.getElementById('vehicleNo').value.trim().toUpperCase();
            const amount = document.getElementById('amount').value;
            
            if (!vehicleNo || vehicleNo.length < 2) {
                showNotification('Please enter a valid vehicle number 🚗', 'error');
                document.getElementById('vehicleNo').focus();
                return;
            }
            
            if (!amount || amount <= 0 || amount > 999999) {
                showNotification('Please enter a valid amount (1 - 999999) 💰', 'error');
                document.getElementById('amount').focus();
                return;
            }
            
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span> Generating...';
            
            try {
                const tokenData = await generateToken();
                const dateTime = formatDateTime();
                
                const receiptData = {
                    token: tokenData.token,
                    tokenNumber: tokenData.tokenNumber,
                    vehicleNo: vehicleNo,
                    amount: parseInt(amount),
                    paymentMode: selectedPaymentMode,
                    date: dateTime.date,
                    time: dateTime.time,
                    isoDate: dateTime.isoDate,
                    isoTime: dateTime.isoTime
                };
                
                await saveToFirestore(receiptData);
                showReceipt(receiptData);
                
                document.getElementById('billingForm').reset();
                document.querySelectorAll('.payment-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                document.querySelector('.payment-option[data-mode="cash"]').classList.add('selected');
                selectedPaymentMode = 'cash';
                
                showNotification(`🎉 Receipt ${tokenData.token} generated successfully!`, 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error generating receipt. Please try again. ❌', 'error');
            } finally {
                submitBtn.disabled = false;
                btnText.textContent = 'Generate Receipt';
            }
        });

        // Keyboard shortcuts
        document.addEventListener('keydown', function(e) {
            if (e.key === 'Escape' && document.getElementById('receiptModal').classList.contains('active')) {
                closeReceipt();
            }
            
            if (e.ctrlKey && e.key === 'Enter' && !document.getElementById('receiptModal').classList.contains('active')) {
                document.getElementById('billingForm').dispatchEvent(new Event('submit'));
            }
        });

        document.getElementById('receiptModal').addEventListener('click', function(e) {
            if (e.target === this) closeReceipt();
        });

        window.addEventListener('load', function() {
            setTimeout(() => document.getElementById('vehicleNo').focus(), 600);
        });

        document.getElementById('vehicleNo').addEventListener('input', function(e) {
            this.value = this.value.toUpperCase();
        });

        document.getElementById('amount').addEventListener('keydown', function(e) {
            if ([46, 8, 9, 27, 13, 37, 38, 39, 40].indexOf(e.keyCode) !== -1 ||
                (e.keyCode === 65 && e.ctrlKey === true) ||
                (e.keyCode === 67 && e.ctrlKey === true) ||
                (e.keyCode === 86 && e.ctrlKey === true) ||
                (e.keyCode === 88 && e.ctrlKey === true) ||
                (e.keyCode >= 35 && e.keyCode <= 36)) {
                return;
            }
            if ((e.shiftKey || (e.keyCode < 48 || e.keyCode > 57)) && 
                (e.keyCode < 96 || e.keyCode > 105)) {
                e.preventDefault();
            }
        });

        console.log('🚗 ELITE AUTO WASH EXPRESS - Billing System Ready');
        console.log('✨ Divine Shrine for Your Blessed Ride');
        console.log('🎫 Token Format: ELITE-abcd (Sequential)');
        console.log('🖤 Black Icons - Professional Receipt');
    </script>
</body>
