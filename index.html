<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ELITE AUTO WASH EXPRESS | Billing System</title>
    
    <!-- Firebase SDK -->
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-app-compat.js"></script>
    <script src="https://www.gstatic.com/firebasejs/10.12.0/firebase-firestore-compat.js"></script>
    
    <!-- html2canvas for image generation -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/html2canvas/1.4.1/html2canvas.min.js"></script>
    
    <style>
        :root {
            --primary: #1a1a2e;
            --secondary: #16213e;
            --accent: #0f3460;
            --gold: #d4af37;
            --gold-light: #f4d03f;
            --white: #ffffff;
            --light-gray: #f5f5f5;
            --medium-gray: #e0e0e0;
            --dark-gray: #333333;
            --success: #27ae60;
            --border-radius: 12px;
            --shadow: 0 10px 30px rgba(0, 0, 0, 0.1);
            --transition: all 0.3s cubic-bezier(0.4, 0, 0.2, 1);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Segoe UI', system-ui, -apple-system, sans-serif;
            background: linear-gradient(135deg, #667eea 0%, #764ba2 100%);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .app-container {
            width: 100%;
            max-width: 600px;
            background: var(--white);
            border-radius: 20px;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.3);
            overflow: hidden;
        }

        .app-header {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            padding: 30px 20px 25px;
            text-align: center;
            position: relative;
        }

        .logo-container {
            margin-bottom: 15px;
        }

        .logo-icon {
            width: 70px;
            height: 70px;
            background: linear-gradient(135deg, var(--gold) 0%, var(--gold-light) 100%);
            border-radius: 50%;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            box-shadow: 0 10px 30px rgba(212, 175, 55, 0.3);
            animation: pulse 2s infinite;
        }

        @keyframes pulse {
            0%, 100% { transform: scale(1); }
            50% { transform: scale(1.05); }
        }

        .logo-icon svg {
            width: 40px;
            height: 40px;
            fill: var(--primary);
        }

        .brand-title {
            font-size: 2rem;
            font-weight: 800;
            color: var(--white);
            letter-spacing: 2px;
            margin-bottom: 8px;
            text-transform: uppercase;
        }

        .brand-tagline {
            font-size: 0.9rem;
            color: var(--gold-light);
            letter-spacing: 1px;
            font-style: italic;
            opacity: 0.9;
        }

        .app-body {
            padding: 30px 25px;
        }

        .form-group {
            margin-bottom: 20px;
            position: relative;
        }

        .form-label {
            display: block;
            font-size: 0.85rem;
            font-weight: 600;
            color: var(--dark-gray);
            margin-bottom: 8px;
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-input {
            width: 100%;
            padding: 14px 18px;
            border: 2px solid var(--medium-gray);
            border-radius: var(--border-radius);
            font-size: 1rem;
            transition: var(--transition);
            background: var(--light-gray);
            font-family: inherit;
        }

        .form-input:focus {
            outline: none;
            border-color: var(--accent);
            box-shadow: 0 0 0 3px rgba(15, 52, 96, 0.1);
            background: var(--white);
        }

        .payment-modes {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
        }

        .payment-option {
            padding: 14px;
            border: 2px solid var(--medium-gray);
            border-radius: var(--border-radius);
            text-align: center;
            cursor: pointer;
            transition: var(--transition);
            background: var(--light-gray);
            font-weight: 600;
            color: var(--dark-gray);
        }

        .payment-option:hover {
            border-color: var(--accent);
            background: #f0f4ff;
        }

        .payment-option.selected {
            border-color: var(--accent);
            background: linear-gradient(135deg, var(--accent) 0%, var(--secondary) 100%);
            color: var(--white);
        }

        .submit-btn {
            width: 100%;
            padding: 16px;
            background: linear-gradient(135deg, var(--gold) 0%, #b8860b 100%);
            color: var(--primary);
            border: none;
            border-radius: var(--border-radius);
            font-size: 1.1rem;
            font-weight: 700;
            cursor: pointer;
            transition: var(--transition);
            text-transform: uppercase;
            letter-spacing: 1px;
            margin-top: 10px;
            position: relative;
            overflow: hidden;
        }

        .submit-btn:hover {
            transform: translateY(-2px);
            box-shadow: 0 10px 25px rgba(212, 175, 55, 0.4);
        }

        .submit-btn:active {
            transform: translateY(0);
        }

        .submit-btn:disabled {
            opacity: 0.6;
            cursor: not-allowed;
            transform: none;
        }

        .loading-spinner {
            display: none;
            width: 20px;
            height: 20px;
            border: 3px solid var(--primary);
            border-top-color: transparent;
            border-radius: 50%;
            animation: spin 0.8s linear infinite;
            margin-right: 10px;
            display: inline-block;
        }

        @keyframes spin {
            to { transform: rotate(360deg); }
        }

        /* Receipt Modal */
        .modal-overlay {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.8);
            z-index: 1000;
            align-items: center;
            justify-content: center;
        }

        .modal-overlay.active {
            display: flex;
        }

        .modal-content {
            background: var(--white);
            border-radius: 20px;
            max-width: 450px;
            width: 95%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: 0 20px 60px rgba(0, 0, 0, 0.5);
        }

        /* Receipt Styling */
        .receipt {
            padding: 30px 25px;
            background: var(--white);
            font-family: 'Courier New', monospace;
        }

        .receipt-header {
            text-align: center;
            border-bottom: 2px dashed var(--medium-gray);
            padding-bottom: 20px;
            margin-bottom: 20px;
        }

        .receipt-logo {
            font-size: 1.5rem;
            font-weight: 900;
            color: var(--primary);
            letter-spacing: 2px;
            margin-bottom: 5px;
        }

        .receipt-tagline {
            font-size: 0.75rem;
            color: var(--gold);
            font-style: italic;
            margin-bottom: 15px;
        }

        .receipt-token {
            background: linear-gradient(135deg, var(--primary) 0%, var(--accent) 100%);
            color: var(--white);
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: 3px;
            display: inline-block;
            margin: 10px 0;
        }

        .receipt-details {
            margin: 20px 0;
        }

        .receipt-row {
            display: flex;
            justify-content: space-between;
            padding: 8px 0;
            border-bottom: 1px dotted var(--medium-gray);
            font-size: 0.9rem;
        }

        .receipt-label {
            color: #666;
            font-weight: 600;
        }

        .receipt-value {
            color: var(--dark-gray);
            font-weight: 700;
        }

        .receipt-amount {
            text-align: center;
            margin: 20px 0;
            padding: 15px;
            background: var(--light-gray);
            border-radius: 10px;
        }

        .receipt-amount-value {
            font-size: 2rem;
            font-weight: 900;
            color: var(--accent);
        }

        .receipt-footer {
            text-align: center;
            border-top: 2px dashed var(--medium-gray);
            padding-top: 20px;
            margin-top: 20px;
            font-size: 0.85rem;
            color: #666;
        }

        .receipt-thankyou {
            font-size: 1.1rem;
            font-weight: 700;
            color: var(--primary);
            margin-bottom: 5px;
        }

        .modal-actions {
            display: flex;
            gap: 10px;
            padding: 20px 25px;
            background: var(--light-gray);
            border-radius: 0 0 20px 20px;
        }

        .action-btn {
            flex: 1;
            padding: 12px;
            border: none;
            border-radius: 10px;
            font-weight: 600;
            cursor: pointer;
            transition: var(--transition);
            font-size: 0.9rem;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .whatsapp-btn {
            background: #25D366;
            color: white;
        }

        .whatsapp-btn:hover {
            background: #1ea952;
        }

        .close-btn {
            background: var(--medium-gray);
            color: var(--dark-gray);
        }

        .close-btn:hover {
            background: #bdbdbd;
        }

        .notification {
            position: fixed;
            top: 20px;
            right: 20px;
            padding: 15px 25px;
            border-radius: 10px;
            color: white;
            font-weight: 600;
            z-index: 2000;
            animation: slideIn 0.3s ease;
            box-shadow: 0 10px 30px rgba(0, 0, 0, 0.2);
        }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        .notification.success {
            background: var(--success);
        }

        .notification.error {
            background: #e74c3c;
        }

        /* Responsive */
        @media (max-width: 480px) {
            .brand-title {
                font-size: 1.5rem;
            }
            
            .app-body {
                padding: 20px 15px;
            }
            
            .receipt {
                padding: 20px 15px;
            }
        }
    </style>
</head>
<body>
    <div class="app-container">
        <!-- Header -->
        <div class="app-header">
            <div class="logo-container">
                <div class="logo-icon">
                    <svg viewBox="0 0 24 24">
                        <path d="M18.92 6.01C18.72 5.42 18.16 5 17.5 5h-11C5.84 5 5.29 5.42 5.08 6.01L3 12v8c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-1h12v1c0 .55.45 1 1 1h1c.55 0 1-.45 1-1v-8l-2.08-5.99zM6.5 16c-.83 0-1.5-.67-1.5-1.5S5.67 13 6.5 13s1.5.67 1.5 1.5S7.33 16 6.5 16zm11 0c-.83 0-1.5-.67-1.5-1.5s.67-1.5 1.5-1.5 1.5.67 1.5 1.5-.67 1.5-1.5 1.5zM5 11l1.5-4.5h11L19 11H5z"/>
                    </svg>
                </div>
            </div>
            <h1 class="brand-title">ELITE AUTO WASH EXPRESS</h1>
            <p class="brand-tagline">✨ Divine Shrine for Your Blessed Ride ✨</p>
        </div>

        <!-- Form -->
        <div class="app-body">
            <form id="billingForm">
                <div class="form-group">
                    <label class="form-label" for="vehicleNo">🚗 Vehicle Number</label>
                    <input type="text" id="vehicleNo" class="form-input" 
                           placeholder="e.g., KA 01 AB 1234" required autocomplete="off">
                </div>

                <div class="form-group">
                    <label class="form-label" for="amount">💰 Amount Paid (₹)</label>
                    <input type="number" id="amount" class="form-input" 
                           placeholder="Enter amount in rupees" min="1" required>
                </div>

                <div class="form-group">
                    <label class="form-label">💳 Payment Mode</label>
                    <div class="payment-modes">
                        <div class="payment-option selected" data-mode="cash" onclick="selectPaymentMode('cash', this)">
                            💵 Cash
                        </div>
                        <div class="payment-option" data-mode="upi" onclick="selectPaymentMode('upi', this)">
                            📱 UPI
                        </div>
                    </div>
                </div>

                <button type="submit" class="submit-btn" id="submitBtn">
                    <span id="btnText">Generate Receipt</span>
                </button>
            </form>
        </div>
    </div>

    <!-- Receipt Modal -->
    <div class="modal-overlay" id="receiptModal">
        <div class="modal-content">
            <div class="receipt" id="receiptContent">
                <!-- Receipt will be generated here -->
            </div>
            <div class="modal-actions">
                <button class="action-btn whatsapp-btn" onclick="sendViaWhatsApp()">
                    📤 Send via WhatsApp
                </button>
                <button class="action-btn close-btn" onclick="closeReceipt()">
                    ✕ Close
                </button>
            </div>
        </div>
    </div>

    <script>
        // ============================================
        // FIREBASE CONFIGURATION
        // Replace with your Firebase config
        // ============================================
        const firebaseConfig = {
  apiKey: "AIzaSyAxQoFW6QiaazIcvkEPsYbnTv7zfKe8c-Y",
  authDomain: "patternetweb.firebaseapp.com",
  databaseURL: "https://patternetweb-default-rtdb.firebaseio.com",
  projectId: "patternetweb",
  storageBucket: "patternetweb.firebasestorage.app",
  messagingSenderId: "78400752693",
  appId: "1:78400752693:web:540fbbcab615e6b078b57c"
};

        // Initialize Firebase
        firebase.initializeApp(firebaseConfig);
        const db = firebase.firestore();

        // ============================================
        // GLOBAL VARIABLES
        // ============================================
        let selectedPaymentMode = 'cash';
        let currentReceiptData = null;

        // ============================================
        // PAYMENT MODE SELECTION
        // ============================================
        function selectPaymentMode(mode, element) {
            selectedPaymentMode = mode;
            
            // Update UI
            document.querySelectorAll('.payment-option').forEach(opt => {
                opt.classList.remove('selected');
            });
            element.classList.add('selected');
        }

        // ============================================
        // GENERATE UNIQUE TOKEN
        // ============================================
        function generateToken() {
            const timestamp = Date.now().toString(36).toUpperCase();
            const random = Math.random().toString(36).substring(2, 6).toUpperCase();
            return `EW-${timestamp}-${random}`;
        }

        // ============================================
        // FORMAT DATE AND TIME
        // ============================================
        function formatDateTime() {
            const now = new Date();
            
            const dateOptions = { 
                weekday: 'long', 
                year: 'numeric', 
                month: 'long', 
                day: 'numeric' 
            };
            
            const timeOptions = { 
                hour: '2-digit', 
                minute: '2-digit', 
                second: '2-digit',
                hour12: true 
            };
            
            return {
                date: now.toLocaleDateString('en-IN', dateOptions),
                time: now.toLocaleTimeString('en-IN', timeOptions),
                isoDate: now.toISOString().split('T')[0],
                isoTime: now.toTimeString().split(' ')[0]
            };
        }

        // ============================================
        // SAVE TO FIRESTORE
        // ============================================
        async function saveToFirestore(receiptData) {
            try {
                const docRef = await db.collection('bills').add({
                    token: receiptData.token,
                    vehicleNo: receiptData.vehicleNo,
                    amount: receiptData.amount,
                    paymentMode: receiptData.paymentMode,
                    date: receiptData.date,
                    time: receiptData.time,
                    isoDate: receiptData.isoDate,
                    isoTime: receiptData.isoTime,
                    createdAt: firebase.firestore.FieldValue.serverTimestamp()
                });
                
                console.log('Receipt saved with ID:', docRef.id);
                return docRef.id;
            } catch (error) {
                console.error('Error saving to Firestore:', error);
                throw error;
            }
        }

        // ============================================
        // GENERATE RECEIPT HTML
        // ============================================
        function generateReceiptHTML(data) {
            return `
                <div class="receipt-header">
                    <div class="receipt-logo">🚗 ELITE AUTO WASH EXPRESS</div>
                    <div class="receipt-tagline">✨ Divine Shrine for Your Blessed Ride ✨</div>
                    <div class="receipt-token">${data.token}</div>
                    <div style="font-size: 0.75rem; color: #999; margin-top: 5px;">
                        Token No.
                    </div>
                </div>
                
                <div class="receipt-details">
                    <div class="receipt-row">
                        <span class="receipt-label">📅 Date</span>
                        <span class="receipt-value">${data.date}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="receipt-label">🕐 Time</span>
                        <span class="receipt-value">${data.time}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="receipt-label">🚗 Vehicle No.</span>
                        <span class="receipt-value">${data.vehicleNo}</span>
                    </div>
                    <div class="receipt-row">
                        <span class="receipt-label">💳 Payment Mode</span>
                        <span class="receipt-value">${data.paymentMode === 'cash' ? '💵 Cash' : '📱 UPI'}</span>
                    </div>
                </div>
                
                <div class="receipt-amount">
                    <div style="font-size: 0.8rem; color: #666; margin-bottom: 5px;">AMOUNT PAID</div>
                    <div class="receipt-amount-value">₹ ${data.amount}</div>
                </div>
                
                <div class="receipt-footer">
                    <div class="receipt-thankyou">🙏 Thank You! Visit Again 🙏</div>
                    <div style="margin-top: 10px;">Drive Safe & Blessed</div>
                    <div style="font-size: 0.7rem; margin-top: 10px; opacity: 0.6;">
                        This is a computer-generated receipt
                    </div>
                </div>
            `;
        }

        // ============================================
        // SHOW RECEIPT MODAL
        // ============================================
        function showReceipt(data) {
            currentReceiptData = data;
            const receiptHTML = generateReceiptHTML(data);
            document.getElementById('receiptContent').innerHTML = receiptHTML;
            document.getElementById('receiptModal').classList.add('active');
        }

        // ============================================
        // CLOSE RECEIPT MODAL
        // ============================================
        function closeReceipt() {
            document.getElementById('receiptModal').classList.remove('active');
            currentReceiptData = null;
        }

        // ============================================
        // SEND VIA WHATSAPP
        // ============================================
        function sendViaWhatsApp() {
            if (!currentReceiptData) {
                showNotification('No receipt data found', 'error');
                return;
            }

            const receiptElement = document.getElementById('receiptContent');
            
            html2canvas(receiptElement, {
                scale: 2,
                backgroundColor: '#ffffff',
                logging: false
            }).then(canvas => {
                // Convert to blob
                canvas.toBlob(function(blob) {
                    // Create file from blob
                    const file = new File([blob], `receipt-${currentReceiptData.token}.png`, { 
                        type: 'image/png' 
                    });
                    
                    // Check if file size is manageable
                    if (file.size > 5 * 1024 * 1024) {
                        showNotification('Image too large. Please try again.', 'error');
                        return;
                    }
                    
                    // Create share data
                    const shareData = {
                        files: [file],
                        title: 'ELITE AUTO WASH EXPRESS - Receipt',
                        text: `*ELITE AUTO WASH EXPRESS* ✨\n` +
                              `Token: *${currentReceiptData.token}*\n` +
                              `Vehicle: ${currentReceiptData.vehicleNo}\n` +
                              `Amount: ₹${currentReceiptData.amount}\n` +
                              `Date: ${currentReceiptData.date}\n` +
                              `Thank you! Visit again 🙏`
                    };
                    
                    // Try Web Share API first
                    if (navigator.canShare && navigator.canShare(shareData)) {
                        navigator.share(shareData)
                            .then(() => showNotification('Receipt shared successfully!', 'success'))
                            .catch(err => {
                                console.log('Share failed, downloading:', err);
                                downloadReceiptImage(canvas);
                            });
                    } else {
                        // Fallback: download image
                        downloadReceiptImage(canvas);
                    }
                }, 'image/png');
            }).catch(error => {
                console.error('Error generating image:', error);
                showNotification('Error generating receipt image', 'error');
            });
        }

        // ============================================
        // DOWNLOAD RECEIPT IMAGE (FALLBACK)
        // ============================================
        function downloadReceiptImage(canvas) {
            const link = document.createElement('a');
            link.download = `receipt-${currentReceiptData.token}.png`;
            link.href = canvas.toDataURL('image/png');
            link.click();
            showNotification('Receipt downloaded! Share manually via WhatsApp', 'success');
        }

        // ============================================
        // SHOW NOTIFICATION
        // ============================================
        function showNotification(message, type = 'success') {
            const notification = document.createElement('div');
            notification.className = `notification ${type}`;
            notification.textContent = message;
            document.body.appendChild(notification);
            
            setTimeout(() => {
                notification.style.opacity = '0';
                notification.style.transition = 'opacity 0.3s ease';
                setTimeout(() => notification.remove(), 300);
            }, 3000);
        }

        // ============================================
        // FORM SUBMISSION
        // ============================================
        document.getElementById('billingForm').addEventListener('submit', async function(e) {
            e.preventDefault();
            
            const submitBtn = document.getElementById('submitBtn');
            const btnText = document.getElementById('btnText');
            
            // Get form values
            const vehicleNo = document.getElementById('vehicleNo').value.trim().toUpperCase();
            const amount = document.getElementById('amount').value;
            
            // Validate
            if (!vehicleNo) {
                showNotification('Please enter vehicle number', 'error');
                return;
            }
            
            if (!amount || amount <= 0) {
                showNotification('Please enter valid amount', 'error');
                return;
            }
            
            // Disable button
            submitBtn.disabled = true;
            btnText.innerHTML = '<span class="loading-spinner"></span> Generating...';
            
            try {
                // Generate data
                const dateTime = formatDateTime();
                const token = generateToken();
                
                const receiptData = {
                    token: token,
                    vehicleNo: vehicleNo,
                    amount: parseInt(amount),
                    paymentMode: selectedPaymentMode,
                    date: dateTime.date,
                    time: dateTime.time,
                    isoDate: dateTime.isoDate,
                    isoTime: dateTime.isoTime
                };
                
                // Save to Firestore
                await saveToFirestore(receiptData);
                
                // Show receipt
                showReceipt(receiptData);
                
                // Reset form
                document.getElementById('billingForm').reset();
                document.querySelectorAll('.payment-option').forEach(opt => {
                    opt.classList.remove('selected');
                });
                document.querySelector('.payment-option[data-mode="cash"]').classList.add('selected');
                selectedPaymentMode = 'cash';
                
                showNotification('Receipt generated successfully! ✅', 'success');
                
            } catch (error) {
                console.error('Error:', error);
                showNotification('Error generating receipt. Please try again.', 'error');
            } finally {
                // Enable button
                submitBtn.disabled = false;
                btnText.textContent = 'Generate Receipt';
            }
        });

        // ============================================
        // KEYBOARD SHORTCUTS
        // ============================================
        document.addEventListener('keydown', function(e) {
            // Escape to close modal
            if (e.key === 'Escape') {
                closeReceipt();
            }
            
            // Ctrl+Enter to submit form
            if (e.ctrlKey && e.key === 'Enter') {
                document.getElementById('billingForm').dispatchEvent(new Event('submit'));
            }
        });

        // ============================================
        // CLOSE MODAL ON OVERLAY CLICK
        // ============================================
        document.getElementById('receiptModal').addEventListener('click', function(e) {
            if (e.target === this) {
                closeReceipt();
            }
        });

        // ============================================
        // AUTO-FOCUS ON LOAD
        // ============================================
        window.addEventListener('load', function() {
            document.getElementById('vehicleNo').focus();
        });

        console.log('🚗 ELITE AUTO WASH EXPRESS - Billing System Ready');
        console.log('✨ Divine Shrine for Your Blessed Ride');
    </script>
</body>
</html>
